name = "portal-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Mount the Worker at `portal.guoyuer.com/api/*` (same origin as the Pages
# frontend). This avoids the CF Access cross-subdomain cookie problem: the
# browser already has a portal.guoyuer.com Access cookie from loading the
# page, so same-origin fetches to `/api/*` authenticate silently. The Worker
# strips the `/api` prefix internally so dev flows (`wrangler dev` on
# localhost:8787/timeline) keep working unchanged.
routes = [
  { pattern = "portal.guoyuer.com/api/*", zone_name = "guoyuer.com" },
]

[[r2_buckets]]
binding = "PORTAL_DATA"
bucket_name = "portal-data"
