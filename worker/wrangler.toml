name = "portal-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Mount the Worker at `portal.guoyuer.com/api/*` (same origin as the Pages
# frontend). This avoids the CF Access cross-subdomain cookie problem: the
# browser already has a portal.guoyuer.com Access cookie from loading the
# page, so same-origin fetches to `/api/*` authenticate silently. The Worker
# strips the `/api` prefix internally so dev flows (`wrangler dev` on
# localhost:8787/timeline) keep working unchanged.
routes = [
  { pattern = "portal.guoyuer.com/api/*", zone_name = "guoyuer.com" },
]

# REQUIRE_AUTH stays "false" while the migration settles — the portal.guoyuer.com
# Access app already gates every request that reaches this Worker, so the
# in-Worker header check is defense-in-depth only. A follow-up PR will flip
# this to "true" once we've confirmed the Access cookie flow is stable.
[vars]
REQUIRE_AUTH = "false"
ALLOWED_EMAIL = "guoyuer1@gmail.com"

[[d1_databases]]
binding = "DB"
database_name = "portal-db"
database_id = "bc076d75-f6ff-4966-99a2-f71e3ba8a033"
