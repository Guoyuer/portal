name: E2E (real Worker)

# Expensive job (build + wrangler startup + Playwright) — gated on an opt-in
# label OR manual dispatch so it doesn't pile onto every PR. The cheap
# mock-API E2E runs on the main ci.yml Playwright step; this one catches
# what the mock can't: R2 artifact serving, Worker code defects, and payload
# parity with the frontend's Zod schema.
on:
  pull_request:
    types: [labeled, synchronize, reopened]
  workflow_dispatch:

jobs:
  e2e-real-worker:
    # Label gate: only runs when the PR carries `real-worker-e2e`. The
    # `contains(...)` form is the documented way to key off labels on both
    # `labeled` (fires when you add the label to an open PR) and
    # `synchronize` (fires on subsequent pushes while the label stays on).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'real-worker-e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Install Worker dependencies
        working-directory: worker
        run: npm ci

      # ── Seed local R2 from L2 golden fixtures ──────────────────
      # Builds timemachine.db from committed fixtures, exports endpoint-shaped
      # artifacts, and publishes them to Wrangler local R2. Fully offline.
      - name: Seed local R2
        run: bash pipeline/scripts/seed_local_r2_from_fixtures.sh

      # ── Start wrangler dev --local in the background ──────────
      # Background wrangler, then poll /timeline until 200 so the Next
      # build knows the Worker is reachable at bake time.
      - name: Start wrangler dev (local R2)
        working-directory: worker
        run: |
          nohup npx wrangler dev --local > "$GITHUB_WORKSPACE/wrangler.log" 2>&1 &
          echo "WRANGLER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for wrangler /timeline
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8787/timeline > /dev/null 2>&1; then
              echo "wrangler ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::wrangler did not serve /timeline within 90s"
          cat "$GITHUB_WORKSPACE/wrangler.log" || true
          exit 1

      # ── Zod smoke: /timeline vs. frontend schema ──────────────
      # Worker doesn't validate at runtime (thin R2 streaming facade,
      # see CLAUDE.md "Worker"), so an artifact-vs-schema drift
      # would only surface when a user loads the page in prod. This
      # step runs `TimelineDataSchema.safeParse` against the live
      # wrangler response — drift fails CI here with a clean
      # path.message, not downstream as a cryptic Playwright render
      # error. Runs before the Next build for fast feedback.
      - name: Validate /timeline against Zod schema
        run: npx tsx scripts/validate_timeline_zod.ts

      # ── Build Next static pointing at the real Worker ─────────
      # NEXT_PUBLIC_TIMELINE_URL is baked into the JS bundle at build
      # time, so this MUST happen after wrangler is up (the build
      # doesn't hit the Worker, but the Playwright run after will).
      - name: Build Next for real Worker
        run: npx next build
        env:
          NEXT_PUBLIC_TIMELINE_URL: http://localhost:8787/api

      # ── Playwright ────────────────────────────────────────────
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run real-worker Playwright specs
        run: npx playwright test --config=playwright.config.real.ts

      # ── On failure, tail wrangler log so CI output is debuggable ─
      - name: Tail wrangler log on failure
        if: failure()
        run: |
          echo "::group::wrangler.log (last 200 lines)"
          tail -n 200 "$GITHUB_WORKSPACE/wrangler.log" || true
          echo "::endgroup::"

      - name: Stop wrangler
        if: always()
        run: |
          if [ -n "${WRANGLER_PID:-}" ]; then
            kill "$WRANGLER_PID" 2>/dev/null || true
          fi
