name: Generate Report

on:
  schedule:
    - cron: '0 13 * * *'   # Daily 9AM ET
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Python deps
        run: pip install -r pipeline/requirements.txt

      - name: Download data from R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p ./data
          for f in positions.csv history.csv qianjiapp.db config.json sync_meta.json; do
            npx wrangler r2 object get "asset-snapshot-data/latest/$f" --file "./data/$f" --remote 2>/dev/null \
              && echo "Downloaded $f" \
              || echo "[skip] $f not found"
          done
          # Net worth history (append-only, persisted in R2)
          npx wrangler r2 object get "asset-snapshot-data/data/net_worth_history.json" --file "./data/net_worth_history.json" --remote 2>/dev/null \
            && echo "Downloaded net_worth_history.json" \
            || echo "[skip] net_worth_history.json not found (first run)"
          # Previous report (for portfolio reconciliation)
          npx wrangler r2 object get "asset-snapshot-data/reports/latest.json" --file "./data/previous_report.json" --remote 2>/dev/null \
            && echo "Downloaded previous_report.json" \
            || echo "[skip] previous_report.json not found (first run)"

      - name: Check data freshness
        id: freshness
        run: |
          if [ -f ./data/sync_meta.json ] && [ -s ./data/sync_meta.json ]; then
            synced=$(python3 -c "import json; print(json.load(open('./data/sync_meta.json'))['synced_at'][:10])")
            today=$(date +%Y-%m-%d)
            age=$(python3 -c "from datetime import date; print((date.fromisoformat('$today') - date.fromisoformat('$synced')).days)")
            echo "Data synced: $synced ($age days ago)"
            if [ "$age" -gt 7 ]; then
              echo "stale=true" >> "$GITHUB_OUTPUT"
              echo "::warning::Data is $age days old — skipping report generation"
            else
              echo "stale=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No sync metadata found"
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate report JSON
        if: steps.freshness.outputs.stale == 'false'
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: cd pipeline && python scripts/send_report.py --data-dir ../data

      - name: Upload JSON to R2
        if: steps.freshness.outputs.stale == 'false'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler r2 object put asset-snapshot-data/reports/latest.json \
            --file ./data/report.json --remote
          npx wrangler r2 object put asset-snapshot-data/data/net_worth_history.json \
            --file ./data/net_worth_history.json --remote
          if [ -f ./data/econ.json ]; then
            npx wrangler r2 object put asset-snapshot-data/reports/econ.json \
              --file ./data/econ.json --remote
            echo "Uploaded econ.json"
          fi
