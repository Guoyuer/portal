name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # GitHub is moving JavaScript actions from Node 20 to Node 24 in 2026.
  # Opt in now so the deploy path is tested before the default changes.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt pytest pytest-cov mypy ruff hypothesis
      # Coverage gate: threshold set in pipeline/pyproject.toml [tool.coverage.report]
      # (floor well below current ~94% — catches regressions, not a ratchet).
      - run: cd pipeline && python -m pytest -q --cov=etl --cov-report=term-missing --cov-report=xml --cov-fail-under=75
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-coverage
          path: pipeline/coverage.xml
          if-no-files-found: warn
      - run: cd pipeline && python -m mypy etl/ --ignore-missing-imports
      - run: cd pipeline && python -m ruff check .

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json
      - run: npm ci
      - name: Install Worker dependencies
        working-directory: worker
        run: npm ci
      - uses: actions/cache@v5
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json') }}-

      # ── Unit tests + coverage ──────────────────────────────────
      - run: npm run test:coverage
      - name: Worker typecheck
        working-directory: worker
        run: npx tsc -p tsconfig.json --noEmit
      - name: Coverage report to PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

      # ── E2E tests (skipped for Dependabot — no access to secrets) ──
      - name: Cache Playwright browsers
        if: github.actor != 'dependabot[bot]'
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: github.actor != 'dependabot[bot]' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright system deps
        if: github.actor != 'dependabot[bot]' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Run E2E tests
        if: github.actor != 'dependabot[bot]'
        run: npx playwright test

      # ── Lighthouse CI baseline (PR-only; artifact, no enforcement) ──
      # `staticDistDir` mode in lighthouserc.json — LHCI serves `out/` itself.
      # We force `--webpack` because Next 16 defaults to Turbopack, which
      # does not produce the static `out/` export Lighthouse needs.
      - name: Build for Lighthouse CI (webpack)
        if: github.event_name == 'pull_request'
        run: npx next build --webpack
      - name: Run Lighthouse CI
        if: github.event_name == 'pull_request'
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true

      # ── Rebuild for production deploy (real Worker URL) ────────
      - name: Build for production
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx next build
        env:
          NEXT_PUBLIC_TIMELINE_URL: ${{ secrets.NEXT_PUBLIC_TIMELINE_URL || 'https://portal.guoyuer.com/api' }}

      # Deploy only on main (not PRs). Worker deploys remain manual because
      # the zone route token needs permissions the Pages deploy token does not have.
      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy out --project-name=portal --commit-dirty=true
