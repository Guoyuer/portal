name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Path-filter gate. Branch protection requires `python` and `frontend` status
  # checks, so we can't skip those jobs entirely — GitHub treats a skipped
  # required check as "expected forever" and blocks merges. Instead, this job
  # emits booleans that the downstream jobs use to skip expensive steps while
  # still completing as success, satisfying required-check gates.
  detect:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'pipeline/**'
              - '.github/workflows/ci*.yml'
              - 'worker/schema.sql'
            frontend:
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.*'
              - 'tsconfig*.json'
              - 'vitest.config.*'
              - 'playwright.config.*'
              - 'e2e/**'
              - 'lighthouserc.json'
              - '.github/workflows/ci*.yml'

  python:
    runs-on: ubuntu-latest
    needs: detect
    steps:
      - name: Skip notice (out of scope)
        if: needs.detect.outputs.python != 'true' && github.event_name == 'pull_request'
        run: echo "No pipeline/** changes — python job is a no-op for this PR."
      - uses: actions/checkout@v6
        if: needs.detect.outputs.python == 'true' || github.event_name == 'push'
      - uses: actions/setup-python@v6
        if: needs.detect.outputs.python == 'true' || github.event_name == 'push'
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - if: needs.detect.outputs.python == 'true' || github.event_name == 'push'
        run: pip install -r pipeline/requirements.txt pytest pytest-cov mypy ruff hypothesis
      # Coverage gate: threshold set in pipeline/pyproject.toml [tool.coverage.report]
      # (floor well below current ~94% — catches regressions, not a ratchet).
      - if: needs.detect.outputs.python == 'true' || github.event_name == 'push'
        run: cd pipeline && python -m pytest -q --cov=etl --cov-report=term-missing --cov-report=xml --cov-fail-under=75
      - name: Upload coverage report
        if: (needs.detect.outputs.python == 'true' || github.event_name == 'push') && always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-coverage
          path: pipeline/coverage.xml
          if-no-files-found: warn
      - if: needs.detect.outputs.python == 'true' || github.event_name == 'push'
        run: cd pipeline && python -m mypy etl/ --ignore-missing-imports
      - if: needs.detect.outputs.python == 'true' || github.event_name == 'push'
        run: cd pipeline && python -m ruff check .
      - name: Verify worker/schema.sql is up to date
        if: needs.detect.outputs.python == 'true' || github.event_name == 'push'
        working-directory: pipeline
        run: |
          python3 scripts/gen_schema_sql.py
          if ! git diff --exit-code ../worker/schema.sql; then
            echo "::error::worker/schema.sql is out of date."
            echo "::error::Run 'cd pipeline && python3 scripts/gen_schema_sql.py' and commit the result."
            exit 1
          fi

  frontend:
    runs-on: ubuntu-latest
    needs: detect
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Skip notice (out of scope)
        if: needs.detect.outputs.frontend != 'true' && github.event_name == 'pull_request'
        run: echo "No frontend/** changes — frontend job is a no-op for this PR."
      - uses: actions/checkout@v6
        if: needs.detect.outputs.frontend == 'true' || github.event_name == 'push'
      - uses: actions/setup-node@v6
        if: needs.detect.outputs.frontend == 'true' || github.event_name == 'push'
        with:
          node-version: 22
          cache: npm
      - if: needs.detect.outputs.frontend == 'true' || github.event_name == 'push'
        run: npm ci
      - uses: actions/cache@v5
        if: needs.detect.outputs.frontend == 'true' || github.event_name == 'push'
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json') }}-
      # ── Unit tests + coverage ──────────────────────────────────
      - if: needs.detect.outputs.frontend == 'true' || github.event_name == 'push'
        run: npm run test:coverage
      - name: Coverage report to PR
        if: needs.detect.outputs.frontend == 'true' && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

      # ── E2E tests (skipped for Dependabot — no access to secrets) ──
      - name: Cache Playwright browsers
        if: (needs.detect.outputs.frontend == 'true' || github.event_name == 'push') && github.actor != 'dependabot[bot]'
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: (needs.detect.outputs.frontend == 'true' || github.event_name == 'push') && github.actor != 'dependabot[bot]' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright system deps
        if: (needs.detect.outputs.frontend == 'true' || github.event_name == 'push') && github.actor != 'dependabot[bot]' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Run E2E tests
        if: (needs.detect.outputs.frontend == 'true' || github.event_name == 'push') && github.actor != 'dependabot[bot]'
        run: npx playwright test

      # ── Lighthouse CI baseline (PR-only; artifact, no enforcement) ──
      # T4 from docs/TODO.md: establish a frontend perf baseline so future
      # work visibly shows when a change degrades Lighthouse scores.
      # `staticDistDir` mode in lighthouserc.json — LHCI serves `out/` itself,
      # no separate `npx serve` step. `uploadArtifacts: true` publishes the
      # LHR JSON + HTML reports as a workflow artifact.
      #
      # We force `--webpack` because Next 16 defaults to Turbopack, which
      # doesn't produce the static `out/` export Lighthouse needs.
      - name: Build for Lighthouse CI (webpack)
        if: needs.detect.outputs.frontend == 'true' && github.event_name == 'pull_request'
        run: npx next build --webpack
      - name: Run Lighthouse CI
        if: needs.detect.outputs.frontend == 'true' && github.event_name == 'pull_request'
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true

      # ── Rebuild for production deploy (real Worker URL) ────────
      # Mail worker is same-origin (`/api/mail/*` on portal.guoyuer.com) and
      # hardcoded in src/lib/hooks/use-mail.ts — no env var to set.
      - name: Build for production
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx next build
        env:
          NEXT_PUBLIC_TIMELINE_URL: ${{ secrets.NEXT_PUBLIC_TIMELINE_URL || 'https://portal.guoyuer.com/api' }}

      # Deploy only on main (not PRs).
      # Worker deploys are manual (`cd worker && wrangler deploy`) — the zone
      # routes on portal.guoyuer.com/api/* require `Zone → Workers Routes →
      # Edit` on the token, which the Portal CI token doesn't carry. D1
      # schema is applied as a side effect of `sync_to_d1.py` runs from the
      # pipeline machine; the python job above already fails the build if
      # `worker/schema.sql` drifts from `gen_schema_sql.py` output.
      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy out --project-name=portal --commit-dirty=true
