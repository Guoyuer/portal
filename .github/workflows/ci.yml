name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt pytest mypy ruff
      - run: cd pipeline && python -m pytest -q
      - run: cd pipeline && python -m mypy etl/ --ignore-missing-imports
      - run: cd pipeline && python -m ruff check .
      - name: Verify worker/schema.sql is up to date
        working-directory: pipeline
        run: |
          python3 scripts/gen_schema_sql.py
          if ! git diff --exit-code ../worker/schema.sql; then
            echo "::error::worker/schema.sql is out of date."
            echo "::error::Run 'cd pipeline && python3 scripts/gen_schema_sql.py' and commit the result."
            exit 1
          fi

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/cache@v5
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json') }}-
      # ── Unit tests + coverage ──────────────────────────────────
      - run: npm run test:coverage
      - name: Coverage report to PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

      # ── E2E tests (skipped for Dependabot — no access to secrets) ──
      - name: Cache Playwright browsers
        if: github.actor != 'dependabot[bot]'
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: github.actor != 'dependabot[bot]' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright system deps
        if: github.actor != 'dependabot[bot]' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Run E2E tests
        if: github.actor != 'dependabot[bot]'
        run: npx playwright test

      # ── Rebuild for production deploy (real Worker URL) ────────
      # Mail worker is same-origin (`/api/mail/*` on portal.guoyuer.com) and
      # hardcoded in src/lib/use-mail.ts — no env var to set.
      - name: Build for production
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx next build
        env:
          NEXT_PUBLIC_TIMELINE_URL: ${{ secrets.NEXT_PUBLIC_TIMELINE_URL || 'https://portal.guoyuer.com/api' }}

      # Deploy only on main (not PRs).
      # Worker deploys are manual (`cd worker && wrangler deploy`) — the zone
      # routes on portal.guoyuer.com/api/* require `Zone → Workers Routes →
      # Edit` on the token, which the Portal CI token doesn't carry. D1
      # schema is applied as a side effect of `sync_to_d1.py` runs from the
      # pipeline machine; the python job above already fails the build if
      # `worker/schema.sql` drifts from `gen_schema_sql.py` output.
      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy out --project-name=portal --commit-dirty=true
