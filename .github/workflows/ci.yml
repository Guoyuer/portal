name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt pytest mypy ruff
      - run: cd pipeline && python -m pytest -q
      - run: cd pipeline && python -m mypy generate_asset_snapshot/ --ignore-missing-imports
      - run: cd pipeline && python -m ruff check .

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json') }}-
      - run: npx next build
        env:
          NEXT_PUBLIC_R2_URL: ${{ secrets.NEXT_PUBLIC_R2_URL }}
          NEXT_PUBLIC_TIMELINE_URL: http://localhost:8000/timeline
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: Create test DB & start backend
        run: |
          cd pipeline && python scripts/create_test_db.py
          cd pipeline && python -m generate_asset_snapshot.server &
          sleep 2
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: Run e2e tests
        run: npx playwright test
        env:
          NEXT_PUBLIC_R2_URL: ${{ secrets.NEXT_PUBLIC_R2_URL }}
          NEXT_PUBLIC_TIMELINE_URL: http://localhost:8000/timeline
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
      # Deploy only on main (not PRs)
      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=portal --commit-dirty=true
