name: D1 Backup

# Weekly export of the production D1 database to a dated GitHub Release.
# This is the recovery story for accidental schema changes, dropped tables,
# or a deleted D1 instance — portal-db had no off-Cloudflare backup before
# this workflow. Saturday 04:00 UTC keeps the job off business-hours CI
# traffic; Saturday specifically so a Friday schema change has had a
# weeknight to settle before being pickled. The `workflow_dispatch` trigger
# lets me fire it manually for testing or before risky migrations.
on:
  schedule:
    - cron: "0 4 * * 6"
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # required for `gh release create`
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # wrangler is a dev-dependency of the Worker — installing gives us the
      # exact version pinned in its package-lock.json.
      - name: Install wrangler (portal worker)
        working-directory: worker
        run: npm ci

      - name: Run backup
        working-directory: pipeline
        run: python scripts/backup_d1.py
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN:              ${{ github.token }}
