name: Nightly Sync

# Two-stage nightly maintenance of D1 when the local Windows machine is
# offline. Stage 1 fills daily_close (stock/ETF closes + USD/CNY) from
# yfinance. Stage 2 projects computed_daily forward from the last
# local-authoritative date using a pure-price model — the networth chart
# keeps moving day-to-day even without a local sync. Local sync still
# wins: its range-replace (sync_to_d1.py) overwrites projections on next
# run. Only maintains symbols/dates already in D1 — first-time seeding
# stays on the local pipeline. Runs at 23:00 UTC (07:00 +08 next morning,
# well after US market close).
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Stage 1 — sync daily_close prices
        working-directory: pipeline
        run: python scripts/sync_prices_nightly.py
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Stage 2 — project computed_daily forward
        working-directory: pipeline
        run: python scripts/project_networth_nightly.py
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
