name: Prices Sync

# Fills daily_close (stock/ETF closes + USD/CNY) on D1 without needing the
# local Windows machine. Only maintains symbols already in D1 — new symbols
# still need the local pipeline's first-time seeding. Runs at 23:00 UTC
# (07:00 +08 the next morning, well after US market close).
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Run nightly price sync
        working-directory: pipeline
        run: python scripts/sync_prices_nightly.py
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
